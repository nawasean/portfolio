<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Nawaporn Saengthong</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ════════════════════════════════
       NAV
  ════════════════════════════════ -->
  <nav>
    <a href="#home" class="nav-logo">N<span>.</span>Saengthong</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#about"      data-i18n="nav.about"></a></li>
        <li><a href="#experience" data-i18n="nav.experience"></a></li>
        <li><a href="#skills"     data-i18n="nav.skills"></a></li>
        <li><a href="#work"       data-i18n="nav.work"></a></li>
        <li><a href="#contact"    data-i18n="nav.contact"></a></li>
      </ul>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        id="btn-th" onclick="setLang('th')">TH</button>
      </div>
    </div>
  </nav>

  <!-- ════════════════════════════════
       HERO
  ════════════════════════════════ -->
  <section id="home">
    <div class="hero-content fade-in">
      <div class="hero-tag" data-i18n="hero.tag"></div>
      <h1 class="hero-name">
        <span data-i18n="hero.name1"></span><br>
        <em data-i18n="hero.name2"></em>
      </h1>
      <p class="hero-tagline" data-i18n="hero.tagline"></p>
      <p class="hero-sub"     data-i18n="hero.sub"></p>
      <div class="hero-cta">
        <a href="#work" class="btn-primary" data-i18n="hero.cta_work"></a>
        <a href="https://drive.google.com/file/d/1T4zxb7PLZPs6tNMhhwBhErPir0Ap7sip/view"
           target="_blank" class="btn-outline" data-i18n="hero.cta_cv"></a>
      </div>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-num">7+</div>
          <div class="stat-label" data-i18n="hero.stat1_label"></div>
        </div>
        <div class="stat">
          <div class="stat-num">8+</div>
          <div class="stat-label" data-i18n="hero.stat2_label"></div>
        </div>
        <div class="stat">
          <div class="stat-num">1.1M</div>
          <div class="stat-label" data-i18n="hero.stat3_label"></div>
        </div>
      </div>
    </div>
    <div class="hero-image fade-in" style="transition-delay:.2s">
      <div class="hero-avatar">N</div>
    </div>
  </section>

  <!-- ════════════════════════════════
       ABOUT
  ════════════════════════════════ -->
  <section id="about">
    <div class="section-header fade-in">
      <div class="section-eyebrow" data-i18n="about.eyebrow"></div>
      <h2 class="section-title">Design meets <em>words.</em></h2>
    </div>
    <div class="about-grid">

      <div class="fade-in">
        <div class="about-card">
          <h4 data-i18n="about.tools_label"></h4>
          <div class="tool-tags">
            <span class="tag">Figma</span>
            <span class="tag">Adobe XD</span>
            <span class="tag">Photoshop</span>
            <span class="tag">Illustrator</span>
            <span class="tag">Premiere Pro</span>
            <span class="tag">WordPress</span>
            <span class="tag">Google Analytics</span>
            <span class="tag">Meta Business Suite</span>
            <span class="tag">YouTube Studio</span>
            <span class="tag">Microsoft 365</span>
          </div>
        </div>
        <div class="about-card">
          <h4 data-i18n="about.education_label"></h4>
          <div style="margin-bottom:1rem">
            <div class="edu-title" data-i18n="about.edu1_title"></div>
            <div class="edu-sub"   data-i18n="about.edu1_sub"></div>
          </div>
          <div>
            <div class="edu-title" data-i18n="about.edu2_title"></div>
            <div class="edu-sub"   data-i18n="about.edu2_sub"></div>
            <div class="edu-badge" data-i18n="about.edu2_badge"></div>
          </div>
        </div>
      </div>

      <div class="about-text fade-in" style="transition-delay:.1s">
        <p data-i18n-html="about.p1"></p>
        <p data-i18n-html="about.p2"></p>
        <p data-i18n-html="about.p3"></p>
      </div>

    </div>
  </section>

  <!-- ════════════════════════════════
       EXPERIENCE
  ════════════════════════════════ -->
  <section id="experience">
    <div class="section-header fade-in">
      <div class="section-eyebrow" data-i18n="experience.eyebrow"></div>
      <h2 class="section-title"    data-i18n-html="experience.title"></h2>
    </div>
    <!-- Jobs injected by script.js -->
    <div class="timeline fade-in" id="timeline"></div>
  </section>

  <!-- ════════════════════════════════
       SKILLS
  ════════════════════════════════ -->
  <section id="skills">
    <div class="section-header fade-in">
      <div class="section-eyebrow" data-i18n="skills.eyebrow"></div>
      <h2 class="section-title"    data-i18n-html="skills.title"></h2>
      <p  class="section-sub"      data-i18n="skills.sub"></p>
    </div>
    <!-- Skills injected by script.js -->
    <div class="skills-grid" id="skills-grid"></div>
  </section>

  <!-- ════════════════════════════════
       WORK
  ════════════════════════════════ -->
  <section id="work">
    <div class="section-header fade-in">
      <div class="section-eyebrow" data-i18n="work.eyebrow"></div>
      <h2 class="section-title"    data-i18n-html="work.title"></h2>
      <p  class="section-sub"      data-i18n="work.sub"></p>
    </div>
    <div class="filter-tabs fade-in" id="filter-tabs"></div>
    <!-- Projects injected by script.js -->
    <div class="work-grid" id="work-grid"></div>
  </section>

  <!-- ════════════════════════════════
       CERTIFICATES
  ════════════════════════════════ -->
  <section id="certificates">
    <div class="section-header fade-in">
      <div class="section-eyebrow" data-i18n="certificates.eyebrow"></div>
      <h2 class="section-title"    data-i18n-html="certificates.title"></h2>
    </div>
    <!-- Certs injected by script.js -->
    <div class="cert-grid" id="cert-grid"></div>
  </section>

  <!-- ════════════════════════════════
       CONTACT
  ════════════════════════════════ -->
  <section id="contact">
    <div class="contact-grid">
      <div class="fade-in">
        <div class="section-eyebrow" data-i18n="contact.eyebrow"></div>
        <p class="contact-quote"      data-i18n-html="contact.quote"></p>
        <p class="contact-sub"        data-i18n="contact.sub"></p>
      </div>
      <div class="fade-in" style="transition-delay:.15s">
        <div class="contact-links">
          <a href="https://drive.google.com/file/d/1T4zxb7PLZPs6tNMhhwBhErPir0Ap7sip/view"
             target="_blank" class="contact-link">
            <span class="contact-link-icon">📄</span>
            <div>
              <div class="contact-link-title" data-i18n="contact.link1_title"></div>
              <div class="contact-link-sub"   data-i18n="contact.link1_sub"></div>
            </div>
          </a>
          <a href="mailto:your@email.com" class="contact-link">
            <span class="contact-link-icon">✉️</span>
            <div>
              <div class="contact-link-title" data-i18n="contact.link2_title"></div>
              <div class="contact-link-sub"   data-i18n="contact.link2_sub"></div>
            </div>
          </a>
          <a href="https://www.linkedin.com/in/yourprofile" target="_blank" class="contact-link">
            <span class="contact-link-icon">🔗</span>
            <div>
              <div class="contact-link-title" data-i18n="contact.link3_title"></div>
              <div class="contact-link-sub"   data-i18n="contact.link3_sub"></div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </section>

  <!-- ════════════════════════════════
       FOOTER
  ════════════════════════════════ -->
  <footer>
    <p data-i18n="footer.copy"></p>
    <a href="#home" data-i18n="footer.back_top"></a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
